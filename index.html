<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Security Bunker - System Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', system-ui, sans-serif; }
        .pulse-red { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4 sm:px-6 lg:px-8">

    <div class="max-w-3xl w-full space-y-8">
        <div class="text-center pb-8 border-b border-gray-800">
            <h1 class="text-3xl font-extrabold tracking-tight text-white mb-2">🛡️ AI Security Bunker</h1>
            <p class="text-gray-400">System Status & Incident Report</p>
        </div>

        <div id="main-status-card" class="rounded-xl p-6 border border-gray-800 bg-gray-900 shadow-lg">
            <div class="flex items-center space-x-4 mb-4">
                <div id="status-icon" class="w-6 h-6 rounded-full bg-gray-500"></div>
                <h2 id="status-title" class="text-2xl font-bold">Checking System Status...</h2>
            </div>
            <p id="status-message" class="text-gray-300 leading-relaxed"></p>
            <div class="mt-4 text-sm font-medium text-blue-400" id="eta-container" style="display: none;">
                ⏱️ 예상 복구 시간: <span id="recovery-eta"></span>
            </div>
        </div>

        <div class="bg-gray-800/50 rounded-xl border border-gray-700 p-6 space-y-4">
            <h3 class="text-lg font-semibold border-b border-gray-700 pb-2">System Components</h3>
            <div id="components-list" class="space-y-3">
            </div>
        </div>

        <div class="bg-gray-800/50 rounded-xl border border-gray-700 p-6">
            <h3 class="text-lg font-semibold border-b border-gray-700 pb-2 mb-4">Incident Updates</h3>
            <div id="updates-list" class="space-y-6 pl-4 border-l-2 border-gray-700">
            </div>
        </div>
    </div>

    <script>
        const statusColors = {
            'operational': { bg: 'bg-green-500', text: 'text-green-500', label: 'Operational', border: 'border-green-500/30' },
            'degraded': { bg: 'bg-yellow-500', text: 'text-yellow-500', label: 'Degraded Performance', border: 'border-yellow-500/30' },
            'outage': { bg: 'bg-red-500 pulse-red', text: 'text-red-500', label: 'Major Outage', border: 'border-red-500/50' }
        };

        const componentNames = {
            'api_server': 'Core API Server',
            'customer_dashboard': 'Customer Dashboard',
            'agent_defense': 'Agent Local Defense (Ransomware/FIM)'
        };

        async function fetchStatus() {
            try {
                const response = await fetch('status.json?t=' + new Date().getTime());
                const data = await response.json();
                renderStatus(data);
            } catch (error) {
                document.getElementById('status-title').innerText = "Unable to fetch status";
                document.getElementById('status-message').innerText = "상태 정보를 불러올 수 없습니다. 인터넷 연결을 확인하거나 잠시 후 다시 시도해주세요.";
            }
        }

        function renderStatus(data) {
            const globalConf = statusColors[data.global_status] || statusColors['outage'];
            
            const icon = document.getElementById('status-icon');
            icon.className = `w-6 h-6 rounded-full ${globalConf.bg}`;
            document.getElementById('status-title').innerText = data.global_status === 'operational' ? 'All Systems Operational' : 'System Issues Detected';
            document.getElementById('status-title').className = `text-2xl font-bold ${globalConf.text}`;
            document.getElementById('status-message').innerText = data.message;
            document.getElementById('main-status-card').classList.add(globalConf.border);

            if(data.global_status !== 'operational' && data.estimated_recovery_time) {
                document.getElementById('eta-container').style.display = 'block';
                document.getElementById('recovery-eta').innerText = data.estimated_recovery_time;
            }

            const compList = document.getElementById('components-list');
            compList.innerHTML = '';
            for (const [key, status] of Object.entries(data.components)) {
                const conf = statusColors[status];
                const name = componentNames[key] || key;
                
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center bg-gray-800 p-3 rounded shadow-sm border border-gray-700/50';
                
                const nameSpan = document.createElement('span');
                nameSpan.className = 'font-medium text-gray-200';
                nameSpan.textContent = name;
                
                const statusSpan = document.createElement('span');
                statusSpan.className = `${conf.text} font-semibold flex items-center`;
                statusSpan.innerHTML = `<span class="w-2 h-2 rounded-full ${conf.bg.split(' ')[0]} mr-2"></span>`;
                statusSpan.appendChild(document.createTextNode(conf.label));
                
                div.appendChild(nameSpan);
                div.appendChild(statusSpan);
                compList.appendChild(div);
            }

            const updatesList = document.getElementById('updates-list');
            updatesList.innerHTML = '';
            if (data.updates && data.updates.length > 0) {
                data.updates.forEach(update => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'relative';
                    
                    const dot = document.createElement('div');
                    dot.className = 'absolute -left-[1.35rem] mt-1.5 w-3 h-3 bg-gray-600 rounded-full border-2 border-gray-900';
                    
                    const timeSpan = document.createElement('span');
                    timeSpan.className = 'text-xs font-bold text-gray-400 block mb-1';
                    timeSpan.textContent = update.time; // [H-1 잔존 XSS 완벽 차단]
                    
                    const p = document.createElement('p');
                    p.className = 'text-gray-300 text-sm leading-relaxed';
                    p.textContent = update.message; // [H-1 잔존 XSS 완벽 차단]
                    
                    wrapper.appendChild(dot);
                    wrapper.appendChild(timeSpan);
                    wrapper.appendChild(p);
                    
                    updatesList.appendChild(wrapper);
                });
            } else {
                updatesList.innerHTML = '<p class="text-gray-500 text-sm">No recent incident updates.</p>';
            }
        }

        fetchStatus();
        setInterval(fetchStatus, 60000);
    </script>
</body>
</html>
